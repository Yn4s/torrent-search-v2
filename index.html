<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرك بحث التورنت الموحد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --accent-color: #3498db;
            --text-color: #e1e1e6;
            --text-muted: #a8a8b3;
            --border-color: #29292e;
            
            /* ألوان المجموعات للكلمات المفتاحية */
            --color-premium: #f39c12;
            --color-standard: #3498db;
            --color-tech: #9b59b6;
            --color-series: #2ecc71;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 850px; /* تم تكبير الحاوية قليلاً لتستوعب المواقع الجديدة بشكل متناسق */
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        h1 i {
            color: var(--accent-color);
            margin-left: 10px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 1rem;
        }

        /* صندوق البحث والمكونات الملحقة به */
        .search-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 50px;
            padding: 6px 15px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .search-box:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 4px 20px rgba(52, 152, 219, 0.2);
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            padding: 12px;
            color: #fff;
            font-size: 1.1rem;
            font-family: 'Cairo', sans-serif;
        }

        .search-box input:focus {
            outline: none;
        }

        .search-row button {
            border: none;
            color: white;
            padding: 14px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-search { background: var(--accent-color); }
        .btn-search:hover { background: #2980b9; }

        .year-select {
            background: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 12px;
            border-radius: 25px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }

        /* مجموعات الأوسمة والكلمات المفتاحية الملونة */
        .tags-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
            padding: 8px;
            background: rgba(255,255,255,0.02);
            border-radius: 15px;
        }

        .search-tag {
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            direction: ltr;
            background: var(--card-bg);
        }

        /* ألوان مخصصة لكل فئة */
        .tag-premium { color: var(--color-premium); border-color: rgba(243, 156, 18, 0.4); }
        .tag-premium:hover { background: var(--color-premium); color: #fff; }

        .tag-standard { color: var(--color-standard); border-color: rgba(52, 152, 219, 0.4); }
        .tag-standard:hover { background: var(--color-standard); color: #fff; }

        .tag-tech { color: var(--color-tech); border-color: rgba(155, 89, 182, 0.4); }
        .tag-tech:hover { background: var(--color-tech); color: #fff; }

        .tag-series { color: var(--color-series); border-color: rgba(46, 204, 113, 0.4); }
        .tag-series:hover { background: var(--color-series); color: #fff; }

        /* أزرار تصفية المواقع الكبرى */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .filter-btn {
            background: #1e1e24;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px 16px;
            border-radius: 20px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            color: #fff;
            border-color: #555;
        }

        .filter-btn.active {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
            box-shadow: 0 2px 10px rgba(52, 152, 219, 0.3);
        }

        /* خيارات مواقع التورنت والتحميل */
        .providers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
            gap: 12px;
        }

        .provider-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .provider-card:hover {
            transform: translateY(-3px);
            border-color: #444;
        }

        .provider-card input[type="radio"] {
            display: none;
        }

        .provider-card span {
            display: block;
            font-size: 0.95rem;
            font-weight: bold;
        }

        .provider-card input[type="radio"]:checked + span {
            color: var(--accent-color);
        }
        
        .provider-card:has(input[type="radio"]:checked) {
            border-color: var(--accent-color);
            background: rgba(52, 152, 219, 0.05);
        }

        footer {
            margin-top: 50px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fa-solid fa-magnet"></i> يونس تورنت</h1>
    <p class="subtitle">ابحث في أفضل وأقوى مواقع التورنت العالمية من مكان واحد</p>

    <form id="searchForm" onsubmit="executeSearch(event)">
        
        <div class="search-area">
            <div class="search-row">
                <select id="yearSelect" class="year-select" onchange="appendYear()">
                    <option value="">السنة</option>
                    <script>
                        const currentYear = new Date().getFullYear();
                        for(let y = currentYear; y >= currentYear - 15; y--) {
                            document.write(`<option value="${y}">${y}</option>`);
                        }
                    </script>
                </select>

                <div class="search-box">
                    <input type="text" id="searchQuery" placeholder="اكتب اسم الفيلم، اللعبة، أو البرنامج..." required autocomplete="off">
                    <i class="fa-solid fa-circle-xmark" id="clearBtn" style="cursor:pointer; color:var(--text-muted); margin: 0 10px; display:none; font-size: 1.2rem;"></i>
                </div>

                <button type="submit" class="btn-search"><i class="fa-solid fa-magnifying-glass"></i> ابحث الآن</button>
            </div>

            <div class="tags-group">
                <div class="search-tag tag-premium" onclick="appendTag('REMUX')">REMUX</div>
                <div class="search-tag tag-premium" onclick="appendTag('2160p')">2160p (4K)</div>
                <div class="search-tag tag-premium" onclick="appendTag('BluRay')">BluRay</div>
                
                <div class="search-tag tag-standard" onclick="appendTag('1080p')">1080p</div>
                <div class="search-tag tag-standard" onclick="appendTag('WEB-DL')">WEB-DL</div>
                <div class="search-tag tag-standard" onclick="appendTag('WEBRip')">WEBRip</div>
                <div class="search-tag tag-standard" onclick="appendTag('720p')">720p</div>
                
                <div class="search-tag tag-tech" onclick="appendTag('HDR')">HDR</div>
                <div class="search-tag tag-tech" onclick="appendTag('DV')">DV (Dolby)</div>
                <div class="search-tag tag-tech" onclick="appendTag('Atmos')">Atmos</div>
                <div class="search-tag tag-tech" onclick="appendTag('10bit')">10bit</div>

                <div class="search-tag tag-series" onclick="appendTag('Complete')"><i class="fa-solid fa-box"></i> Complete</div>
                <div class="search-tag tag-series" onclick="appendTag('S01')">S01</div>
                <div class="search-tag tag-series" onclick="appendTag('S02')">S02</div>
                <div class="search-tag tag-series" onclick="appendTag('S03')">S03</div>
                <div class="search-tag tag-series" onclick="appendTag('S04')">S04</div>
                <div class="search-tag tag-series" onclick="appendTag('S05')">S05</div>
            </div>
        </div>

        <div class="filter-container">
            <button type="button" class="filter-btn active" onclick="filterSites('all', this)"><i class="fa-solid fa-globe"></i> الكل</button>
            <button type="button" class="filter-btn" onclick="filterSites('movies', this)"><i class="fa-solid fa-film"></i> أفلام ومسلسلات</button>
            <button type="button" class="filter-btn" onclick="filterSites('games', this)"><i class="fa-solid fa-gamepad"></i> ألعاب وبرامج</button>
            <button type="button" class="filter-btn" onclick="filterSites('general', this)"><i class="fa-solid fa-box-archive"></i> محركات عامة</button>
        </div>

        <div class="providers-grid" id="providersGrid">
            <label class="provider-card" data-category="movies">
                <input type="radio" name="torrent_site" value="1337x" checked>
                <span>1337x</span>
            </label>
            <label class="provider-card" data-category="movies">
                <input type="radio" name="torrent_site" value="rarbg">
                <span>YTS (أفلام مضغوطة)</span>
            </label>
            <label class="provider-card" data-category="movies">
                <input type="radio" name="torrent_site" value="torrentgalaxy">
                <span>TorrentGalaxy</span>
            </label>
            <label class="provider-card" data-category="movies">
                <input type="radio" name="torrent_site" value="rargb_to">
                <span>RARBG Proxy</span>
            </label>

            <label class="provider-card" data-category="games">
                <input type="radio" name="torrent_site" value="fitgirl">
                <span>FitGirl (الألعاب)</span>
            </label>
            <label class="provider-card" data-category="games">
                <input type="radio" name="torrent_site" value="dodi">
                <span>DODI Repacks</span>
            </label>
            <label class="provider-card" data-category="games">
                <input type="radio" name="torrent_site" value="steamrip">
                <span>SteamRIP</span>
            </label>
            <label class="provider-card" data-category="games">
                <input type="radio" name="torrent_site" value="rutracker">
                <span>RuTracker</span>
            </label>
            <label class="provider-card" data-category="games">
                <input type="radio" name="torrent_site" value="thepiratebay">
                <span>The Pirate Bay</span>
            </label>
            <label class="provider-card" data-category="games">
                <input type="radio" name="torrent_site" value="nyaa">
                <span>Nyaa (الأنمي)</span>
            </label>

            <label class="provider-card" data-category="general">
                <input type="radio" name="torrent_site" value="knaben">
                <span>Knaben (موحد)</span>
            </label>
            <label class="provider-card" data-category="general">
                <input type="radio" name="torrent_site" value="snowfl">
                <span>Snowfl (مجمع)</span>
            </label>
        </div>
    </form>

    <footer>
        <p>تنبيه: تأكد دائماً من استخدام VPN لحماية خصوصيتك أثناء التصفح.</p>
    </footer>
</div>

<script>
const queryInput = document.getElementById('searchQuery');
const clearBtn = document.getElementById('clearBtn');

// دالة تصفية الفئات والبطاقات
function filterSites(category, buttonElement) {
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    buttonElement.classList.add('active');

    const cards = document.querySelectorAll('.provider-card');
    cards.forEach(card => {
        const cardCategory = card.getAttribute('data-category');
        if (category === 'all' || cardCategory === category) {
            card.style.display = 'block';
        } else {
            card.style.display = 'none';
        }
    });

    const currentChecked = document.querySelector('input[name="torrent_site"]:checked');
    if (currentChecked && currentChecked.closest('.provider-card').style.display === 'none') {
        const firstVisibleRadio = document.querySelector('.provider-card[style*="display: block"] input, .provider-card:not([style*="display: none"]) input');
        if (firstVisibleRadio) firstVisibleRadio.checked = true;
    }
}

// التحكم في ظهور وزر الحذف السريع X
queryInput.addEventListener('input', () => {
    clearBtn.style.display = queryInput.value.length > 0 ? 'block' : 'none';
});

clearBtn.addEventListener('click', () => {
    queryInput.value = '';
    clearBtn.style.display = 'none';
    document.getElementById('yearSelect').value = '';
    queryInput.focus();
});

// دالة إضافة وسوم الجودة والمواسم
function appendTag(tagValue) {
    let currentText = queryInput.value.trim();
    if (currentText === "") {
        queryInput.value = tagValue;
    } else if (!currentText.includes(tagValue)) {
        queryInput.value = currentText + " " + tagValue;
    }
    clearBtn.style.display = 'block';
    queryInput.focus();
}

// دالة إضافة السنة المحددة من القائمة تلقائياً
function appendYear() {
    const yearVal = document.getElementById('yearSelect').value;
    if(!yearVal) return;
    
    let currentText = queryInput.value.trim();
    currentText = currentText.replace(/\b(19|20)\d{2}\b/g, '').trim();
    
    queryInput.value = currentText === "" ? yearVal : currentText + " " + yearVal;
    clearBtn.style.display = 'block';
    queryInput.focus();
}

// وظيفة البحث الفردي في موقع محدد
function executeSearch(event) {
    if(event) event.preventDefault(); 
    
    const rawQuery = queryInput.value.trim();
    if(!rawQuery) return;
    
    const selectedSite = document.querySelector('input[name="torrent_site"]:checked').value;
    let searchUrl = '';

    switch(selectedSite) {
        case '1337x': 
            searchUrl = `https://1337x.to/search/${encodeURIComponent(rawQuery)}/1/`; 
            break;
            
        case 'thepiratebay': 
            searchUrl = `https://thepiratebay.org/search.php?q=${encodeURIComponent(rawQuery)}`; 
            break;
            
        case 'rarbg': 
            const ytsQuery = encodeURIComponent(rawQuery.replace(/\s+/g, '-').toLowerCase());
            searchUrl = `https://yts.lu/browse-movies/${ytsQuery}/all/all/0/latest/0/all`;
            break;
            
        case 'nyaa': 
            const nyaaQuery = encodeURIComponent(rawQuery.replace(/\s+/g, '+'));
            searchUrl = `https://nyaa.si/?f=0&c=0&q=${nyaaQuery}`; 
            break;
            
        case 'fitgirl': 
            searchUrl = `https://fitgirl-repacks.site/?s=${encodeURIComponent(rawQuery)}`; 
            break;
            
        case 'dodi': 
            searchUrl = `https://dodi-repacks.site/?s=${encodeURIComponent(rawQuery)}`; 
            break;
            
        case 'steamrip': 
            searchUrl = `https://steamrip.com/?s=${encodeURIComponent(rawQuery)}`; 
            break;
            
        case 'rutracker': 
            const rutrackerQuery = encodeURIComponent(rawQuery.replace(/\s+/g, '.'));
            searchUrl = `https://rutracker.org/forum/tracker.php?nm=${rutrackerQuery}`; 
            break;
            
        case 'torrentgalaxy': 
            searchUrl = `https://torrentgalaxy.to/torrents.php?search=${encodeURIComponent(rawQuery)}`; 
            break;
            
        case 'knaben': 
            const knabenQuery = encodeURIComponent(rawQuery.replace(/\s+/g, '+'));
            searchUrl = `https://knaben.org/search/${knabenQuery}`; 
            break;
            
        case 'rargb_to': 
            searchUrl = `https://rargb.to/search/?search=${encodeURIComponent(rawQuery)}`; 
            break;
            
        case 'snowfl': 
            searchUrl = `https://snowfl.com/#${encodeURIComponent(rawQuery)}`; 
            break;
            
        default: 
            searchUrl = `https://google.com/search?q=${encodeURIComponent(rawQuery)}+torrent`;
    }

    if(searchUrl) {
        window.open(searchUrl, '_blank');
    }
}

// حفظ واستعادة آخر موقع تم تحديده تلقائياً من الـ LocalStorage
document.querySelectorAll('input[name="torrent_site"]').forEach(radio => {
    radio.addEventListener('change', (e) => {
        localStorage.setItem('saved_torrent_provider', e.target.value);
    });
});

window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('saved_torrent_provider');
    if (saved) {
        const targetRadio = document.querySelector(`input[name="torrent_site"][value="${saved}"]`);
        if (targetRadio) targetRadio.checked = true;
    }
});
</script>

</body>
</html>
